esphome:
  name: "ESPHOME_NAME"     # Rename to whatever device name you want.
  friendly_name: "DISPLAY_NAME"     # Display name shown in Home Assistant.

esp32:
  board: esp32-c5-devkitc-1
  variant: esp32c5
  framework:
    type: esp-idf

api:
  encryption:
    key: "YOUR_KEY"     # Generate on https://esphome.io/components/api/.

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "CUSTOM_SSID"     # Rename to whatever SSID you want.
    password: !secret ap_password

captive_portal:

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  hardware_uart: USB_SERIAL_JTAG     # XIAO C5 uses native USB UART for logging.

uart:
  tx_pin: GPIO11     # Do not change.
  rx_pin: GPIO12     # Do not change.
  baud_rate: 9600

climate:
  - platform: midea
    name: DEVICE     # Rename to whatever you want.
    autoconf: true     # Let the Midea component detect supported AC features automatically.
    beeper: false     # Don't beep on commands. Set to true if you want the AC to beep.
    visual:     # Optional. Example of visual settings override.
      min_temperature: 16     # Set to the lowest temperature your AC can display.
      max_temperature: 30     # Set to the highest temperature your AC can display.
      temperature_step: 0.5     # min: 0.5
    outdoor_temperature:     # Optional. Create outdoor unit temperature sensor (may display incorrect values after long inactivity).
      name: DEVICE_TEMP     # Rename to whatever you want.
    power_usage:     # Optional. Create power usage sensor (only for devices that support this feature).
      name: DEVICE_POWER     # Rename to whatever you want.
    humidity_setpoint:     # Optional. Create indoor humidity sensor.
      name: DEVICE_HUMIDITY     # Rename to whatever you want.

remote_transmitter:     # Optional. Send IR commands to the AC unit.
  pin: GPIO23
  carrier_duty_percent: 100%        # 50% for a standard IR LED, 100% when a wire from the AC unit's TSOP is soldered to IR+ on the board.

# "Follow me"
# Feeds an external room-temperature sensor from Home Assistant into the AC's "follow me" feature, so the AC regulates based on actual room
# temperature instead of its own (often inaccurate) internal sensor.
sensor:
  - platform: homeassistant
    entity_id: YOUR_HOMEASSISTANT_TEMPERATURE_SENSOR     # Replace with your own HA temperature sensor.
    id: DEVICE_FOLLOW_ME_TEMP     # Rename to whatever you want.
    internal: true     # Don't expose this as a separate entity; it's only used internally below.
    filters:
      - throttle: 10s     # Ignore updates more frequent than this.
      - heartbeat: 30s     # Re-send the last value at least this often, even if unchanged.
      - debounce: 1s
    on_value:
      midea_ac.follow_me:
        temperature: !lambda "return x;"
        beeper: false     # Don't beep on commands. Set to true if you want the AC to beep.

button:
  - platform: template
    name: DEVICE_DISPLAY     # Rename to whatever you want.
    icon: mdi:theme-light-dark
    on_press:
      midea_ac.display_toggle:     # Toggles the AC's front-panel display on/off.
  - platform: template
    name: DEVICE_SWING     # Rename to whatever you want.
    icon: mdi:tailwind
    on_press:
      midea_ac.swing_step:     # Steps the louver swing mode.