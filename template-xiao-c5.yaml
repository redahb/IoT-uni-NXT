esphome:
  name: "**********"
  friendly_name: "**********"

external_components:
  - source: github://pr#12646
    components: [midea]
    refresh: 1d
    
esp32:
  variant: esp32c5
  flash_size: 8MB
  framework:
    type: esp-idf

psram:
  mode: quad
  speed: 80MHz
  ignore_not_found: false

api:
  encryption:
    key: "**********"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "**********"
    password: !secret ap_password

captive_portal:

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  hardware_uart: USB_SERIAL_JTAG

uart:
  tx_pin: GPIO11
  rx_pin: GPIO12
  baud_rate: 9600

climate:
  - platform: midea
    name: **********
    autoconf: true
    beeper: false
    visual:
      min_temperature: 16
      max_temperature: 30
      temperature_step: 0.5
    outdoor_temperature:
      name: **********
    power_usage:
      name: **********
    humidity_setpoint:
      name: **********

